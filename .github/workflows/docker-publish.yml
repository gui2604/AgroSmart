name: Publish Docker images

on:
  push:
    branches: [main]
    paths:
      - "AgroSmart.Api/**"
      - "AgroSmart.Simulator/**"
      - "docker-compose.yml"
      - ".github/workflows/docker-publish.yml"
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate Docker Hub secrets
        run: |
          if [ -z "${{ secrets.DOCKERHUB_USERNAME }}" ] || [ -z "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "::error::Secrets DOCKERHUB_USERNAME e DOCKERHUB_TOKEN não configurados."
            echo "Em https://github.com/${{ github.repository }}/settings/secrets/actions crie:"
            echo "  - DOCKERHUB_USERNAME = seu usuário do Docker Hub"
            echo "  - DOCKERHUB_TOKEN = token de acesso (https://hub.docker.com/settings/security)"
            exit 1
          fi

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: AgroSmart.Api/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/agrosmart-api:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/agrosmart-api:${{ github.sha }}

      - name: Build and push Simulator image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: AgroSmart.Simulator/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/agrosmart-simulator:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/agrosmart-simulator:${{ github.sha }}
